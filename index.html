<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIXIPIX — Architectural Visualisation</title>
  <meta name="description" content="High-end 3D architectural visualisation. Exteriors, interiors, animations. Melbourne, AU." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c8a96e;
      --font:   'Inter', system-ui, sans-serif;
    }

    body {
      background: #111;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      opacity: 0;
      animation: pageFade 0.8s ease forwards;
    }
    @keyframes pageFade { to { opacity: 1; } }

    a { text-decoration: none; color: inherit; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 28px 40px;
    }
    .nav-mark {
      height: 30px; width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.85; transition: opacity 0.2s;
    }
    .nav-mark:hover { opacity: 1; }
    .nav-logo {
      font-size: 17px; font-weight: 400;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.95);
      text-transform: uppercase;
    }
    .nav-centre {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    .nav-links {
      display: flex; gap: 48px; list-style: none;
    }
    .nav-links a {
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.95);
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-featured { color: var(--accent) !important; }
    .nav-featured:hover { color: #d4b87a !important; }

    /* ── Hero ── */
    #hero {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* Slides */
    .hero-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.1s ease;
    }
    .hero-slide.active { opacity: 1; }

    .hero-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .hero-slide.active .hero-img {
      animation: heroZoom 9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes heroZoom {
      from { transform: scale(1.08); opacity: 0.85; }
      to   { transform: scale(1);    opacity: 1; }
    }

    /* Gradient overlay */
    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        transparent      30%,
        transparent      60%,
        rgba(0,0,0,0.45) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* ── Sky info ── */
    .hero-sky {
      position: absolute;
      top: clamp(80px, 12vw, 130px);
      left: clamp(24px, 5vw, 64px);
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      animation: infoFade 1.4s ease 1.2s forwards;
      transition: opacity 0.35s ease;
    }
    @keyframes infoFade { to { opacity: 1; } }

    .hero-sky-title {
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
    }
    .hero-sky-meta {
      font-size: clamp(9px, 0.9vw, 11px);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }
    .hero-view-btn {
      margin-top: 4px;
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
      transition: opacity 0.2s;
      display: inline-block;
    }
    .hero-view-btn:hover { opacity: 0.55; }

    /* ── Bottom tagline + dots ── */
    .hero-bottom {
      position: absolute;
      bottom: clamp(28px, 4vw, 48px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
      opacity: 0;
      animation: infoFade 1.2s ease 1s forwards;
    }
    .hero-tagline {
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .hero-dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .hero-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      border: none;
      padding: 0;
    }
    .hero-dot.active {
      background: rgba(255,255,255,0.9);
      transform: scale(1.3);
    }
    .hero-dot:hover { background: rgba(255,255,255,0.65); }

    /* ── Arrows ── */
    .hero-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      padding: 16px 14px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .hero-arrow:hover { opacity: 1; background: rgba(0,0,0,0.35); }
    .hero-arrow-prev { left: clamp(12px, 2vw, 28px); }
    .hero-arrow-next { right: clamp(12px, 2vw, 28px); }
    .hero-arrow svg { display: block; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      nav { padding: 20px 24px; }
      .nav-links { gap: 28px; }
      .hero-tagline { white-space: normal; }
      .hero-bottom { width: calc(100% - 48px); text-align: center; }
    }
  </style>
</head>

<body>

  <nav>
    <a href="/"><img class="nav-mark" src="images/logo.png" alt="DIXIPIX" /></a>
    <div class="nav-centre">
      <a class="nav-logo" href="/">DIXIPIX</a>
      <ul class="nav-links">
        <li><a href="work.html">Work</a></li>
        <li><a href="what-we-do.html">What We Do</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="developer-set.html" class="nav-featured">Developer Set</a></li>
      </ul>
    </div>
    <div></div>
  </nav>

  <div id="hero">

    <!-- slides injected by JS -->

    <div class="hero-sky" id="hero-sky">
      <span class="hero-sky-title" id="sky-title"></span>
      <span class="hero-sky-meta"  id="sky-meta"></span>
      <a href="#" class="hero-view-btn" id="sky-btn">View Project</a>
    </div>

    <div class="hero-bottom">
      <p class="hero-tagline">Architectural Visualisation &nbsp;·&nbsp; Melbourne &nbsp;·&nbsp; 4-Day Turnaround</p>
      <div class="hero-dots" id="hero-dots"></div>
    </div>

    <button class="hero-arrow hero-arrow-prev" id="hero-prev" aria-label="Previous">
      <svg width="18" height="32" viewBox="0 0 18 32" fill="none">
        <path d="M15 2L3 16L15 30" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="hero-arrow hero-arrow-next" id="hero-next" aria-label="Next">
      <svg width="18" height="32" viewBox="0 0 18 32" fill="none">
        <path d="M3 2L15 16L3 30" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>

  <script>
    const slides = [
      {
        image: 'images/_hero/hero-seaview.jpg',
        title: 'No. 33–37 Sea View Crescent',
        meta:  'Cronulla, NSW &nbsp;·&nbsp; Multi-Residential &nbsp;·&nbsp; 2024',
        link:  'project.html?id=taren-point',
      },
      {
        image: 'images/_hero/hero-gymea.jpg',
        title: '29 North West Arm Rd',
        meta:  'Gymea, NSW &nbsp;·&nbsp; Multi-Dwelling &nbsp;·&nbsp; 2024',
        link:  'project.html?id=gymea',
      },
      {
        image: 'images/_hero/hero-girrilang.jpg',
        title: '3 Girrilang Rd',
        meta:  'Cronulla, NSW &nbsp;·&nbsp; Boutique Residential &nbsp;·&nbsp; 2024',
        link:  'project.html?id=girrilang',
      },
    ];

    const hero     = document.getElementById('hero');
    const sky      = document.getElementById('hero-sky');
    const title    = document.getElementById('sky-title');
    const meta     = document.getElementById('sky-meta');
    const btn      = document.getElementById('sky-btn');
    const prev     = document.getElementById('hero-prev');
    const next     = document.getElementById('hero-next');
    const dotsWrap = document.getElementById('hero-dots');

    let current = 0;
    let transitioning = false;

    // Build dots
    const dotEls = slides.map((_, i) => {
      const d = document.createElement('button');
      d.className = 'hero-dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', 'Slide ' + (i + 1));
      d.addEventListener('click', () => goTo(i));
      dotsWrap.appendChild(d);
      return d;
    });

    function updateDots(i) {
      dotEls.forEach((d, idx) => d.classList.toggle('active', idx === i));
    }

    // Build slide elements
    const slideEls = slides.map((s, i) => {
      const slide = document.createElement('div');
      slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
      const img = document.createElement('div');
      img.className = 'hero-img';
      img.style.backgroundImage = `url('${s.image}')`;
      slide.appendChild(img);
      hero.insertBefore(slide, sky);
      return slide;
    });

    // Set initial sky info (after initial animation fires)
    function setSky(i, fade) {
      if (fade) {
        sky.style.opacity = '0';
        setTimeout(() => {
          title.textContent  = slides[i].title;
          meta.innerHTML     = slides[i].meta;
          btn.href           = slides[i].link;
          sky.style.opacity  = '1';
        }, 350);
      } else {
        title.textContent = slides[i].title;
        meta.innerHTML    = slides[i].meta;
        btn.href          = slides[i].link;
      }
    }

    // Set slide 0 info immediately (no fade on load)
    setSky(0, false);

    function goTo(index) {
      if (transitioning || index === current) return;
      transitioning = true;

      slideEls[current].classList.remove('active');

      // Restart zoom on incoming slide
      const img = slideEls[index].querySelector('.hero-img');
      img.style.animation = 'none';
      void img.offsetWidth; // force reflow
      img.style.animation  = '';

      slideEls[index].classList.add('active');
      setSky(index, true);
      updateDots(index);
      current = index;

      setTimeout(() => { transitioning = false; }, 1100);
    }

    prev.addEventListener('click', () => goTo((current - 1 + slides.length) % slides.length));
    next.addEventListener('click', () => goTo((current + 1) % slides.length));

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo((current - 1 + slides.length) % slides.length);
      if (e.key === 'ArrowRight') goTo((current + 1) % slides.length);
    });
  </script>

</body>
</html>
