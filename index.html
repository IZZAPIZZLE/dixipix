<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIXIPIX — Architectural Visualisation</title>
  <meta name="description" content="High-end 3D architectural visualisation. Exteriors, interiors, animations. Melbourne, AU." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:    #e8e8e8;
      --accent:  #c8a96e;
      --font:    'Inter', system-ui, sans-serif;
    }

    body {
      background: #111;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* hero only — no scroll */
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 40px 0;
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.88);
      text-transform: uppercase;
      text-decoration: none;
      margin-bottom: 16px;
    }

    .nav-links {
      display: flex;
      gap: 64px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: rgba(255,255,255,0.9); }

    /* ── Hero ── */
    #hero {
      position: fixed;
      inset: 0;
      background-image: url('images/_hero/hero.jpg');
      background-size: cover;
      background-position: center;
    }

    /* Bottom-edge fade to prevent hard cut if needed later */
    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.18) 0%,
        transparent      35%,
        transparent      65%,
        rgba(0,0,0,0.35) 100%
      );
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .nav-links { gap: 36px; }
      nav { padding-top: 28px; }
    }
  </style>
</head>

<body>

  <nav>
    <a class="nav-logo" href="/">DIXIPIX</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="what-we-do.html">What We Do</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div id="hero"></div>

</body>
</html>
