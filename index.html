<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIXIPIX — Architectural Visualisation</title>
  <meta name="description" content="High-end 3D architectural visualisation. Exteriors, interiors, animations. Melbourne, AU." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:    #e8e8e8;
      --accent:  #c8a96e;
      --font:    'Inter', system-ui, sans-serif;
    }

    body {
      background: #111;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* hero only — no scroll */
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 28px 40px;
    }

    .nav-mark {
      height: 30px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .nav-mark:hover { opacity: 1; }

    .nav-logo {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.95);
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-centre {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .nav-links {
      display: flex;
      gap: 48px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.95);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #c8a96e; }

    /* ── Hero ── */
    #hero {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      background-image: url('images/_hero/hero-dugs.jpg');
      background-size: cover;
      background-position: center;
      animation: heroZoom 9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes heroZoom {
      from { transform: scale(1.08); opacity: 0.85; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.22) 0%,
        transparent      30%,
        transparent      60%,
        rgba(0,0,0,0.4)  100%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .nav-links { gap: 36px; }
      nav { padding-top: 28px; }
    }
  </style>
</head>

<body>

  <nav>
    <a href="/"><img class="nav-mark" src="images/logo.png" alt="DIXIPIX" /></a>
    <div class="nav-centre">
      <a class="nav-logo" href="/">DIXIPIX</a>
      <ul class="nav-links">
        <li><a href="work.html">Work</a></li>
        <li><a href="what-we-do.html">What We Do</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
    <div></div>
  </nav>

  <div id="hero">
    <div class="hero-img"></div>
  </div>

</body>
</html>
