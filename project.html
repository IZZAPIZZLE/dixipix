<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — DIXIPIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --bg-2:       #111;
      --border:     #1e1e1e;
      --text:       #e0e0e0;
      --text-muted: #555;
      --accent:     #c8a96e;
      --font:       'Inter', system-ui, sans-serif;
      --pad:        clamp(24px, 6vw, 96px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-mark {
      height: 30px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .nav-mark:hover { opacity: 1; }

    .nav-logo {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.95);
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 48px;
      list-style: none;
      justify-self: end;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: rgba(255,255,255,0.9); }
    .nav-featured { color: #c8a96e !important; }
    .nav-featured:hover { color: #d4b87a !important; }

    /* ── Page ── */
    main {
      padding-top: 80px;
      max-width: 900px;
      margin: 0 auto;
      padding-left: var(--pad);
      padding-right: var(--pad);
      padding-bottom: 100px;
    }

    /* ── Back link ── */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 48px;
      margin-bottom: 52px;
      transition: color 0.2s;
    }

    .back:hover { color: var(--text); }

    /* ── Header ── */
    .project-header {
      margin-bottom: 28px;
    }

    .project-info {
      padding: 36px 0 48px;
    }

    .project-type {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .project-title {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0;
    }

    .project-meta {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      margin-bottom: 36px;
    }

    .meta-item {}

    .meta-key {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .meta-val {
      font-size: 13px;
      font-weight: 300;
      color: var(--text);
    }

    .project-description {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(255,255,255,0.6);
      max-width: 620px;
    }

    /* ── Page fade ── */
    body { opacity: 0; animation: pageFade 0.6s ease 0.05s forwards; }
    @keyframes pageFade { to { opacity: 1; } }

    /* ── Scroll fade ── */
    .fade-up {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* ── Images ── */
    .project-images {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .project-img-wrap {
      width: 100%;
      overflow: hidden;
      background: #161616;
      cursor: zoom-in;
    }

    .project-img-wrap img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .project-img-wrap:hover img { transform: scale(1.02); }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lightbox-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
      transform: scale(0.97);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .lightbox.open .lightbox-img { transform: scale(1); }

    .lightbox-close {
      position: absolute;
      top: 24px; right: 32px;
      background: none; border: none;
      color: rgba(255,255,255,0.4);
      font-size: 22px; cursor: pointer;
      transition: color 0.2s; padding: 8px;
    }
    .lightbox-close:hover { color: #fff; }

    .lightbox-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 20px 28px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lightbox-btn:hover { color: #fff; }
    .lightbox-btn.prev { left: 0; }
    .lightbox-btn.next { right: 0; }

    .lightbox-counter {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px clamp(20px, 6vw, 96px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    footer span, footer a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    footer a:hover { color: var(--text); }

    /* ── Project video ── */
    .project-video {
      display: block;
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      margin-top: 4px;
    }
    @media (max-width: 640px) {
      .project-video {
        width: 100vw;
        margin-left: calc(-1 * var(--pad));
        height: 75vw;
        aspect-ratio: unset;
      }
    }

    /* ── CTA ── */
    .project-cta {
      margin-top: 72px;
      padding-top: 52px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }

    .cta-text {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-muted);
    }

    .cta-btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--accent);
      color: #0d0d0d;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .cta-btn:hover { background: #d9ba7e; }

    /* ── Hamburger ── */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }
    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 1px;
      background: rgba(255,255,255,0.85);
      transition: transform 0.3s ease, opacity 0.2s ease;
      transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    .nav-mobile-menu {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.98);
      z-index: 90;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
      backdrop-filter: blur(12px);
      padding: 0 clamp(28px, 6vw, 96px);
    }
    .nav-mobile-menu.open { opacity: 1; pointer-events: all; }
    .nav-mobile-menu a {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 340px;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.45s ease, opacity 0.45s ease, color 0.2s;
    }
    .nav-mobile-menu.open a:nth-child(1) { transition-delay: 0.08s; }
    .nav-mobile-menu.open a:nth-child(2) { transition-delay: 0.14s; }
    .nav-mobile-menu.open a:nth-child(3) { transition-delay: 0.20s; }
    .nav-mobile-menu.open a:nth-child(4) { transition-delay: 0.26s; }
    .nav-mobile-menu.open a { transform: translateY(0); opacity: 1; }
    .nav-mobile-menu a:active { color: #fff; }
    .nav-mobile-menu .mob-featured { color: #c8a96e; border-bottom: none; }
    .mob-num {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #c8a96e;
      opacity: 0.6;
      flex-shrink: 0;
    }
    .nav-mobile-footer {
      position: absolute;
      bottom: 48px;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      nav { padding: 18px 20px; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .project-img-wrap {
        width: 100vw;
        margin-left: calc(-1 * var(--pad));
      }
      .project-img-wrap img {
        height: 75vw;
        object-fit: cover;
      }
      .project-meta { gap: 20px; }
      .project-description { max-width: 100%; }
      .project-cta { flex-direction: column; align-items: flex-start; }
      .cta-btn { width: 100%; text-align: center; }
      .lightbox-btn { padding: 16px 14px; }
      .lightbox-btn span { display: none; }
    }
  </style>
</head>

  <script>
    const projects = {
      'girrilang': {

        images: [

      },

        images: [
          'images/seaview/01.jpg',

      },

        date:     '2025',
        description: `A bold residential build on the edge of Yowie Bay. The facade is defined by vertical dark fins that filter light and frame views from inside, creating a dynamic streetscape that shifts with the sun. Inside, the open-plan living area dissolves beneath a full-length skylight, flooding the kitchen and dining space with natural light. Stone, timber, and glass in a composition that is confident without being loud.`,
        images: [
          'images/yowie-bay/01.jpg',
          'images/yowie-bay/02.jpg',
        ],
      },
      'gymea': {
        name:     'North West Arm Rd',
        type:     'Exterior',
        architect: 'Couvaras Architects',
        location: 'Gymea, NSW',
        date:     '2025',
        description: `A considered multi-dwelling development on Gymea's quiet suburban edge. Stone base, dark corrugated upper cladding, and deep-set glazing give the building a grounded, material-led character. Generous landscaping softens the street edge and connects the structure to its leafy context. The result is a building that sits comfortably in the neighbourhood while clearly elevating its standard.`,
        images: [
          'images/gymea/01.jpg',
          'images/gymea/02.jpg',
        ],
      },
      'tiny-home': {
        name:     'Tiny Home',
        type:     'Exterior',
        architect: '—',
        location: 'Westport, NZ',
        date:     '2023',
        description: `A study in doing more with less. The Tiny Home project strips residential architecture back to its essentials: a black steel exoskeleton, warm timber cladding, and full-height glazing that dissolves the boundary between inside and out. Set in native bushland, the structure sits lightly on the land with a raised deck that grounds it without anchoring it. The floor plan is tight, deliberate, and wastes nothing. This is prefab done with conviction.`,

          'images/tiny-home/01.jpg',
          'images/tiny-home/02.jpg',
          'images/tiny-home/04.jpg',
          'images/tiny-home/05.jpg',
          'images/tiny-home/06.jpg',
          'images/tiny-home/07.jpg',
        ],
      },
      'taren-point': {
        name:     'Taren Point',
        type:     'Exterior',
        architect: 'Couvaras Architects',
        location: 'Taren Point, NSW',
        date:     '2024',
        description: `Taren Point commands attention from the street. The building's curved balconies wrap each level in a continuous sweep of white render, contrasted by a vertical band of dark textured stone at its core. The proportions are generous, five storeys that feel considered rather than imposed. Mature trees frame the elevation and soften the street edge, while golden-hour light brings warmth to a palette that could easily read cold. A building that earns its place.`,

        images: [
          'images/beacons/01.jpg',
          'images/beacons/03.jpg',

        images: [
          'images/the-church/01.jpg',

      'seaforth-residence': {
        name:     'Seaforth Residence',

    // Read project ID from URL: project.html?id=sansouci

          <p class="project-type">${p.type}</p>
          <h1 class="project-title">${p.name}</h1>
        </div>

        <div class="project-img-wrap project-hero-img fade-up" data-index="0">
          <img src="${firstImage}" alt="${p.name}" loading="eager" />
        </div>

        <div class="project-info fade-up">
          <div class="project-meta">
            <div class="meta-item">
              <div class="meta-key">Location</div>
              <div class="meta-val">${p.location}</div>
            </div>
            <div class="meta-item">
              <div class="meta-key">Year</div>
              <div class="meta-val">${p.date}</div>
            </div>
            <div class="meta-item">
              <div class="meta-key">Architect / Designer</div>
              <div class="meta-val">${p.architect}</div>
            </div>
          </div>
          <p class="project-description">${p.description}</p>
        </div>

        <div class="project-images">
          ${restHTML}
        </div>

        ${p.video ? `
        <video class="project-video fade-up" autoplay muted loop playsinline preload="auto">
          <source src="${p.video}" type="video/mp4" />
        </video>
        ` : ''}

        <div class="project-cta fade-up">
          <p class="cta-text">Like what you see?</p>
          <a href="contact.html" class="cta-btn">Start a project</a>
        </div>
      `;

      // ── Lightbox (elements are static in DOM, safe to grab here) ──
      const lightbox  = document.getElementById('lightbox');
      const lbImg     = document.getElementById('lb-img');
      const lbClose   = document.getElementById('lb-close');
      const lbPrev    = document.getElementById('lb-prev');
      const lbNext    = document.getElementById('lb-next');
      const lbCounter = document.getElementById('lb-counter');
      let lbIndex = 0;

      function openLightbox(idx) {
        lbIndex = idx;
        lbImg.src = allImages[lbIndex];
        lbCounter.textContent = `${lbIndex + 1} / ${allImages.length}`;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      }

      function lbNav(dir) {
        lbIndex = (lbIndex + dir + allImages.length) % allImages.length;
        lbImg.style.opacity = '0';
        setTimeout(() => {
          lbImg.src = allImages[lbIndex];
          lbImg.style.opacity = '1';
          lbCounter.textContent = `${lbIndex + 1} / ${allImages.length}`;
        }, 150);
      }

      lbImg.style.transition = 'opacity 0.2s ease';

      document.querySelectorAll('.project-img-wrap').forEach(wrap => {
        wrap.addEventListener('click', () => openLightbox(+wrap.dataset.index));
      });

      lbClose.addEventListener('click', closeLightbox);
      lbPrev.addEventListener('click',  () => lbNav(-1));
      lbNext.addEventListener('click',  () => lbNav(1));
      lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape')     closeLightbox();
        if (e.key === 'ArrowLeft')  lbNav(-1);
        if (e.key === 'ArrowRight') lbNav(1);
      });

      // ── Scroll fade ──
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.08 });
      document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

      // ── Lightbox touch swipe ──
      let lbTouchX = 0;
      lightbox.addEventListener('touchstart', e => { lbTouchX = e.touches[0].clientX; }, { passive: true });
      lightbox.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - lbTouchX;
        if (Math.abs(dx) > 50) { dx < 0 ? lbNav(1) : lbNav(-1); }
      }, { passive: true });
    }

    // ── Mobile menu ──
    const navHamburger  = document.getElementById('nav-hamburger');
    const navMobileMenu = document.getElementById('nav-mobile-menu');
    navHamburger.addEventListener('click', () => {
      const open = navMobileMenu.classList.toggle('open');
      navHamburger.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    });
    navMobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navMobileMenu.classList.remove('open');
        navHamburger.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  </script>


</body>
</html>
