<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — DIXIPIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --bg-2:       #111;
      --border:     #1e1e1e;
      --text:       #e0e0e0;
      --text-muted: #555;
      --accent:     #c8a96e;
      --font:       'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-mark {
      height: 30px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .nav-mark:hover { opacity: 1; }
    .nav-logo {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.95);
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      gap: 48px;
      list-style: none;
      justify-self: end;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: rgba(255,255,255,0.9); }

    /* ── Project list ── */
    main {
      padding-top: 80px;
    }

    .project-list {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 clamp(20px, 4vw, 60px) 80px;
    }

    .project-item {
      display: block;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
    }

    /* Full-width image */
    .project-image {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #161616;
    }

    .project-image img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .project-item:hover .project-image img {
      transform: scale(1.03);
    }

    /* Label row beneath image */
    .project-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 18px 0;
      gap: 16px;
    }

    .project-name {
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .project-type {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }

    /* ── Modal — removed, projects now open own page ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-2);
      width: 100%;
      max-width: 960px;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      transform: translateY(24px);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-backdrop.open .modal { transform: translateY(0); }

    .modal-image {
      aspect-ratio: 4/3;
      background: #161616;
      overflow: hidden;
      position: relative;
    }

    .modal-image img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Gallery nav */
    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      background: rgba(0,0,0,0.5);
      border: none;
      color: rgba(255,255,255,0.8);
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
    }

    .gallery-btn:hover { background: rgba(0,0,0,0.8); color: #fff; }
    .gallery-btn.prev  { left: 12px; }
    .gallery-btn.next  { right: 12px; }
    .gallery-btn:disabled { opacity: 0.2; cursor: default; }

    .gallery-counter {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5);
    }

    .modal-info {
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .modal-type {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .modal-name {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .modal-about {
      font-size: 13px;
      font-weight: 300;
      line-height: 1.9;
      color: var(--text-muted);
      flex: 1;
      margin-bottom: 40px;
    }

    .modal-meta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 28px;
    }

    .modal-meta-row {
      display: flex;
      justify-content: space-between;
    }

    .modal-meta-key {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .modal-meta-val {
      font-size: 12px;
      font-weight: 300;
      color: var(--text);
    }

    .modal-close {
      position: fixed;
      top: 24px; right: 24px;
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      z-index: 201;
    }

    .modal-close:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .nav-links { gap: 32px; }
      .project-image { aspect-ratio: 4/3; }
      .modal { grid-template-columns: 1fr; }
      .modal-image { aspect-ratio: 16/9; }
      .modal-info { padding: 28px 24px; }
    }
  </style>
</head>

<body>

  <nav>
    <a href="/"><img class="nav-mark" src="images/logo.png" alt="DIXIPIX" /></a>
    <a class="nav-logo" href="/">DIXIPIX</a>
    <ul class="nav-links">
      <li><a href="work.html" class="active">Work</a></li>
      <li><a href="what-we-do.html">What We Do</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="project-list" id="project-list"></div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-image" id="modal-image">
        <button class="gallery-btn prev" id="gallery-prev">&#8592;</button>
        <button class="gallery-btn next" id="gallery-next">&#8594;</button>
        <span class="gallery-counter" id="gallery-counter"></span>
      </div>
      <div class="modal-info">
        <div>
          <div class="modal-type"  id="modal-type"></div>
          <div class="modal-name"  id="modal-name"></div>
          <p   class="modal-about" id="modal-about"></p>
        </div>
        <div class="modal-meta"   id="modal-meta"></div>
      </div>
    </div>
    <button class="modal-close" id="modal-close">&#x2715;</button>
  </div>

  <script>
    const projects = [
      { name: 'Tiny Home',          type: 'Exterior',               id: 'tiny-home',          hero: 'images/tiny-home/01.jpg' },
      { name: 'Taren Point',        type: 'Exterior',               id: 'taren-point',        hero: 'images/taren-point/01.jpg' },
      { name: 'Beacons',            type: 'Exterior · Interior',    id: 'beacons',            hero: 'images/beacons/01.jpg' },
      { name: 'The Church',         type: 'Exterior',               id: 'the-church',         hero: 'images/the-church/01.jpg' },
      { name: 'Seaforth Residence', type: 'Interior',               id: 'seaforth-residence', hero: 'images/seaforth/01.jpg' },
      { name: 'Taren Point Project', type: 'Interior',               id: 'dugs-project',       hero: 'images/dugs/01.jpg' },
      { name: 'Crescent Street',    type: 'Exterior',               id: 'crescent-street',    hero: 'images/crescent-street/01.jpg' },
      { name: 'Sansouci',           type: 'Exterior',               id: 'sansouci',           hero: 'images/sansouci/01.jpg' },
    ];

    const list = document.getElementById('project-list');

    projects.forEach(p => {
      const item = document.createElement('a');
      item.className = 'project-item';
      item.href = `project.html?id=${p.id}`;
      item.innerHTML = `
        <div class="project-image">
          <img src="${p.hero}" alt="${p.name}" loading="lazy" />
        </div>
        <div class="project-label">
          <span class="project-name">${p.name}</span>
          <span class="project-type">${p.type}</span>
        </div>
      `;
      list.appendChild(item);
    });
  </script>

</body>
</html>
